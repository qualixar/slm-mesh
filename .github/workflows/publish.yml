# SLM Mesh — Auto-publish to npm + PyPI on GitHub Release
# Copyright 2026 Qualixar (Varun Pratap Bhardwaj). MIT License.

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for PyPI Trusted Publisher

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build Python package
        run: |
          cd python
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          # Uses Trusted Publisher — no API token needed
          # Configure at: https://pypi.org/manage/project/slm-mesh/settings/publishing/
